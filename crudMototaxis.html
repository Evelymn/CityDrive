<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gestión de Mototaxis</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<!-- ========================= -->
<!-- NAVBAR -->
<!-- ========================= -->

<nav class="navbar bg-white shadow-sm">

    <div class="container-fluid">

        <div class="d-flex align-items-center">

            <img
            src="img/transportes.png"
            alt="CityDrive"
            style="height: 50px; margin-right: 12px;">

            <span
            class="navbar-brand mb-0 fs-3 fw-bold text-dark">

                City<span class="text-success">Drive</span>

            </span>

        </div>

        <a
        href="dashboard.html"
        class="btn btn-secondary">

            Volver

        </a>

    </div>

</nav>

<!-- ========================= -->
<!-- TABLA -->
<!-- ========================= -->

<div class="container mt-5">

    <div class="card shadow border-0">

        <div class="card-body">

            <h3 class="mb-4">

                Registros Guardados

            </h3>

            <table
            class="table table-striped table-hover">

                <thead>

                    <tr>

                        <th>Código</th>

                        <th>Propietario</th>

                        <th>Modelo</th>

                        <th>Color</th>

                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tablaMototaxis">

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- ========================= -->
<!-- MODAL EDITAR -->
<!-- ========================= -->

<div
class="modal fade"
id="modalEditar"
tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    ✏️ Editar Mototaxi

                </h5>

                <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <input
                type="hidden"
                id="editId">

                <!-- Nombre -->

                <div class="mb-3">

                    <label class="form-label">

                        Nombre Completo

                    </label>

                    <input
                    id="editNombre"
                    class="form-control">

                </div>

                <!-- Modelo -->

                <div class="mb-3">

                    <label class="form-label">

                        Modelo

                    </label>

                    <input
                    id="editModelo"
                    class="form-control">

                </div>

                <!-- Color -->

                <div class="mb-3">

                    <label class="form-label">

                        Color

                    </label>

                    <input
                    id="editColor"
                    class="form-control">

                </div>

                <!-- Seguro -->

                <div class="mb-3">

                    <label class="form-label">

                        Seguro de Vida

                    </label>

                    <select
                    id="editSeguro"
                    class="form-select">

                        <option>
                            Sí
                        </option>

                        <option>
                            No
                        </option>

                    </select>

                </div>

            </div>

            <div class="modal-footer">

                <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal">

                    Cancelar

                </button>

                <button
                id="btnGuardarCambios"
                class="btn btn-success">

                    Guardar Cambios

                </button>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
</script>

<!-- CRUD -->

<script
type="module"
src="js/crudMototaxis.js">
</script>

</body>

</html>
