<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <!-- Bootstrap -->
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<!-- Contenido de la tarjeta -->
<body class="bg-light">

    <div class="container-fluid">

        <div class="row vh-100">

            <!-- ====================== -->
            <!-- LADO IZQUIERDO -->
            <!-- ====================== -->

            <div
            class="col-md-6 d-flex flex-column justify-content-center px-5">

                <h3
                class="display-2 fw-bold text-dark">

                    CityDrive

                </h3>

                <p
                class="fs-3 text-secondary">

                    Gestiona mototaxis, taxis y buses
                    desde una sola plataforma.

                </p>

                <div class="mt-4">

                    <img
                    src="img/transportes.png"
                    class="img-fluid"
                    alt="CityDrive">

                </div>

            </div>

            <!-- ====================== -->
            <!-- LADO DERECHO -->
            <!-- ====================== -->

            <div
            class="col-md-6 d-flex justify-content-center align-items-center">

                <div
                class="card shadow p-4"
                style="width: 450px;">

                    <h3
                    class="text-center mb-4">

                        Iniciar Sesión

                    </h3>

                    <!-- Correo -->

                    <div class="form-floating mb-3">

                        <input
                        id="correo"
                        type="email"
                        class="form-control"
                        placeholder="Correo Electrónico">

                        <label for="correo">
                            Correo Electrónico
                        </label>

                    </div>

                    <!-- Contraseña -->

                    <div class="form-floating mb-3">

                        <input
                        id="password"
                        type="password"
                        class="form-control"
                        placeholder="Contraseña">

                        <label for="password">
                            Contraseña
                        </label>

                    </div>

                    <!-- Login -->

                    <button
                    id="btnLogin"
                    class="btn btn-primary w-100 mb-3">

                        Iniciar Sesión

                    </button>

                    <hr>

                    <!-- Registro -->

                    <a
                    href="registro.html"
                    class="btn btn-success w-100">

                        Crear Cuenta

                    </a>

                </div>

            </div>

        </div>

    </div>

    <script
    type="module"
    src="js/login.js">
    </script>

</body>
